name: bump

on:
  pull_request:
    paths: [snapshot.json]
  push:
    branches: [main]
    paths: [snapshot.json]

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: read snapshot SHA
        id: snapshot
        run: |
          SHA=$(jq -r .vg13_sha snapshot.json)
          if [[ "$SHA" == "0000000000000000000000000000000000000000" ]]; then
            echo "snapshot.json still has placeholder SHA; nothing to build"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "short=${SHA::8}" >> "$GITHUB_OUTPUT"

      - name: set up Docker Buildx
        if: steps.snapshot.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3

      - name: log in to GHCR
        if: steps.snapshot.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build and push image
        if: steps.snapshot.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/vg14-developers/vgstation13-mcp:vg13-${{ steps.snapshot.outputs.short }}
            ghcr.io/vg14-developers/vgstation13-mcp:latest
          build-args: |
            VG13_SHA=${{ steps.snapshot.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: extract diff stats from image
        if: steps.snapshot.outputs.skip != 'true' && github.event_name == 'pull_request'
        id: stats
        run: |
          IMAGE="ghcr.io/vg14-developers/vgstation13-mcp:vg13-${{ steps.snapshot.outputs.short }}"
          docker pull "$IMAGE" || docker build --build-arg VG13_SHA=${{ steps.snapshot.outputs.sha }} -t "$IMAGE" .
          docker create --name extract "$IMAGE"
          docker cp extract:/snapshot/index/types.json /tmp/types.json
          docker cp extract:/snapshot/wiki/index.json /tmp/wiki.json
          docker cp extract:/snapshot/assets.idx /tmp/assets.idx
          docker rm extract
          TYPES=$(jq 'length' /tmp/types.json)
          WIKI=$(jq 'length' /tmp/wiki.json)
          ASSETS=$(wc -l < /tmp/assets.idx)
          echo "types=$TYPES" >> "$GITHUB_OUTPUT"
          echo "wiki=$WIKI" >> "$GITHUB_OUTPUT"
          echo "assets=$ASSETS" >> "$GITHUB_OUTPUT"

      - name: comment diff stats on PR
        if: steps.snapshot.outputs.skip != 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              "### Snapshot bump preview",
              "",
              "**vg13 SHA:** `${{ steps.snapshot.outputs.sha }}`",
              "**DM types:** ${{ steps.stats.outputs.types }}",
              "**Wiki pages:** ${{ steps.stats.outputs.wiki }}",
              "**Assets indexed:** ${{ steps.stats.outputs.assets }}",
              "",
              "Merge to deploy.",
            ].join("\n");
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
