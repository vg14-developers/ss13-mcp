name: release dm-dump

on:
  push:
    tags:
      - 'dm-dump-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach binaries to (must already exist)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: dm-dump
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: dm-dump.exe
          - target: x86_64-apple-darwin
            os: macos-13
            artifact: dm-dump
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: dm-dump
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            dm-dump/target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('dm-dump/Cargo.toml') }}

      - name: Build
        working-directory: dm-dump
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename for release
        shell: bash
        run: |
          src="dm-dump/target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          dst="dm-dump-${{ matrix.target }}${{ matrix.artifact == 'dm-dump.exe' && '.exe' || '' }}"
          cp "$src" "$dst"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dm-dump-${{ matrix.target }}*
          fail_on_unmatched_files: true
