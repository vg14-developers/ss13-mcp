services:
  mcp:
    image: ghcr.io/vg14-developers/vgstation13-mcp:latest
    pull_policy: always
    restart: unless-stopped
    environment:
      VG_OAUTH_CLIENT_ID: ${VG_OAUTH_CLIENT_ID}
      VG_OAUTH_CLIENT_SECRET: ${VG_OAUTH_CLIENT_SECRET}
      VG_OAUTH_REDIRECT_URI: ${VG_OAUTH_REDIRECT_URI}
      VG_SESSION_SECRET: ${VG_SESSION_SECRET}
      VG_MCP_ALLOWED_ORGS: ${VG_MCP_ALLOWED_ORGS:-}
    volumes:
      - /var/cache/vgstation13-mcp:/var/cache/vgstation13-mcp
    expose:
      - "8080"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - /var/cache/vgstation13-mcp/conversions:/srv/cache:ro
    environment:
      VG_DOMAIN: ${VG_DOMAIN}
    depends_on:
      - mcp

volumes:
  caddy_data:
  caddy_config:
